<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários - Canto do Saber</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        h2 {
            color: #2c3e50;
            margin-top: 30px;
            border-left: 4px solid #3498db;
            padding-left: 10px;
        }
        form {
            background-color: #fafafa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin: 20px 0;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        textarea {
            resize: vertical;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 1rem;
        }
        button:hover {
            background-color: #2980b9;
        }
        hr {
            border: none;
            border-top: 2px solid #ddd;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Formulários do Sistema Escolar</h1>

    
        <h2>1. Cadastro de Usuário</h2>
        <form>
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo">

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="Digite seu e-mail">

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha">

            <button type="submit">Cadastrar</button>
        </form>


       
        <h2>2. Cadastro de Tarefa</h2>
        <form>
            <label for="titulo">Título</label>
            <input type="text" id="titulo" name="titulo" placeholder="Digite o título da tarefa">

            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" rows="4" placeholder="Descreva a tarefa"></textarea>

            <label for="prioridade">Prioridade</label>
            <select id="prioridade" name="prioridade">
                <option value="baixa">Baixa</option>
                <option value="media">Média</option>
                <option value="alta">Alta</option>
            </select>

            <button type="submit">Salvar tarefa</button>
        </form>



        <h2>3. Reserva de Espaço</h2>
        <form>
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

            <label for="turma">Turma</label>
            <input type="text" id="turma" name="turma" placeholder="Digite sua turma">

            <label for="horario">Horário</label>
            <input type="time" id="horario" name="horario">

            <button type="submit">Reservar</button>
        </form>


        <h2>4. Login</h2>
        <form>
            <label for="email-login">E-mail</label>
            <input type="email" id="email-login" name="email" placeholder="Digite seu e-mail">

            <label for="senha-login">Senha</label>
            <input type="password" id="senha-login" name="senha" placeholder="Digite sua senha">

            <button type="submit">Entrar</button>
        </form>


        <h2>5. Contato com a Coordenação</h2>
        <form>
            <label for="assunto">Assunto</label>
            <input type="text" id="assunto" name="assunto" placeholder="Digite o assunto">

            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" name="mensagem" rows="5" placeholder="Digite sua mensagem"></textarea>

            <button type="submit">Enviar</button>
        </form>

    </div>
</body>
</html>
